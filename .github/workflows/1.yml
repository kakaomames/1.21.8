name: Full Minecraft Environment Installer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: クライアント・サーバー・ライブラリの全取得
        run: |
          # 1. マニフェストとパッケージ情報の取得
          curl -s https://launchermeta.mojang.com/mc/game/version_manifest.json -o version_manifest.json
          PACKAGE_URL=$(grep -o 'https://piston-meta.mojang.com/v1/packages/[^"]*' version_manifest.json | head -n 1)
          VERSION_DATA=$(curl -s $PACKAGE_URL)
          echo "$VERSION_DATA" > version_details.json

          # 2. 本体(Jar)のダウンロード
          CLIENT_URL=$(echo "$VERSION_DATA" | grep -o 'https://piston-data.mojang.com/v1/objects/[^"]*/client.jar')
          SERVER_URL=$(echo "$VERSION_DATA" | grep -o 'https://piston-data.mojang.com/v1/objects/[^"]*/server.jar')
          curl -L -o client.jar "$CLIENT_URL"
          curl -L -o server.jar "$SERVER_URL"

          # 3. ライブラリ軍団のダウンロード (librariesフォルダに集結)
          mkdir -p libraries
          echo "Starting library deployment..."
          
          # JSONからURLを抽出して一気にcurl (jqがないのでgrep/sedで強引に解析)
          # "url": "https://..." の形式をすべて抜き出してダウンロード
          echo "$VERSION_DATA" | grep -o 'https://libraries.minecraft.net/[^"]*' | while read -r url; do
            filename=$(basename "$url")
            if [ ! -f "libraries/$filename" ]; then
              echo "Installing $filename..."
              curl -sL -o "libraries/$filename" "$url"
            fi
          done

          echo "missionLog: すべてのライブラリ（.jar）を確保しました！ ✅"

      - name: Pythonでライブラリを90MBずつパッキング
        shell: python
        run: |
          import os
          import zipfile

          lib_dir = 'libraries'
          max_size = 90 * 1024 * 1024  # 90MB
          
          files = [os.path.join(lib_dir, f) for f in os.listdir(lib_dir) if os.path.isfile(os.path.join(lib_dir, f))]
          
          current_zip_idx = 1
          current_zip_size = 0
          current_zip = zipfile.ZipFile(f'lib_part{current_zip_idx}.zip', 'w', zipfile.ZIP_DEFLATED)

          for file in files:
              f_size = os.path.getsize(file)
              
              # もし次のファイルを足すと90MBを超えるなら、新しいZIPへ
              if current_zip_size + f_size > max_size:
                  current_zip.close()
                  print(f'Finished lib_part{current_zip_idx}.zip (Size: {current_zip_size // 1024 // 1024}MB)')
                  current_zip_idx += 1
                  current_zip_size = 0
                  current_zip = zipfile.ZipFile(f'lib_part{current_zip_idx}.zip', 'w', zipfile.ZIP_DEFLATED)
              
              current_zip.write(file, os.path.basename(file))
              current_zip_size += f_size
          
          current_zip.close()
          print(f'Finished final lib_part{current_zip_idx}.zip (Size: {current_zip_size // 1024 // 1024}MB)')

      - name: 変更をコミットしてPush
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 巨大な元ファイルを消して、新しい分割ZIPをadd
          rm -f lib.zip
          git add lib_part*.zip version_manifest.json client.jar server.jar
          
          git pull origin main --rebase
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: ライブラリを90MBずつパッキングして更新 [skip ci]"
            git push origin main
            echo "missionLog: 分割パッキング作戦、成功しました！ ✅"
          fi
