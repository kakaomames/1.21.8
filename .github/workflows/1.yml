name: Full Minecraft Environment Installer

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: クライアント・サーバー・ライブラリの全取得
        run: |
          # 1. マニフェストとパッケージ情報の取得
          curl -s https://launchermeta.mojang.com/mc/game/version_manifest.json -o version_manifest.json
          PACKAGE_URL=$(grep -o 'https://piston-meta.mojang.com/v1/packages/[^"]*' version_manifest.json | head -n 1)
          VERSION_DATA=$(curl -s $PACKAGE_URL)
          echo "$VERSION_DATA" > version_details.json

          # 2. 本体(Jar)のダウンロード
          CLIENT_URL=$(echo "$VERSION_DATA" | grep -o 'https://piston-data.mojang.com/v1/objects/[^"]*/client.jar')
          SERVER_URL=$(echo "$VERSION_DATA" | grep -o 'https://piston-data.mojang.com/v1/objects/[^"]*/server.jar')
          curl -L -o client.jar "$CLIENT_URL"
          curl -L -o server.jar "$SERVER_URL"

          # 3. ライブラリ軍団のダウンロード (librariesフォルダに集結)
          mkdir -p libraries
          echo "Starting library deployment..."
          
          # JSONからURLを抽出して一気にcurl (jqがないのでgrep/sedで強引に解析)
          # "url": "https://..." の形式をすべて抜き出してダウンロード
          echo "$VERSION_DATA" | grep -o 'https://libraries.minecraft.net/[^"]*' | while read -r url; do
            filename=$(basename "$url")
            if [ ! -f "libraries/$filename" ]; then
              echo "Installing $filename..."
              curl -sL -o "libraries/$filename" "$url"
            fi
          done

          echo "missionLog: すべてのライブラリ（.jar）を確保しました！ ✅"

      - name: Assetsの解析と全ダウンロード
        shell: python
        run: |
          import os, json, urllib.request

          # 1. バージョン詳細からAssetIndexのURLを取得
          with open('version_details.json', 'r') as f:
              details = json.load(f)
          
          asset_index_info = details['assetIndex']
          index_url = asset_index_info['url']
          index_id = asset_index_info['id'] # 例: "1.21"

          # 2. インデックスファイル（地図）を保存
          os.makedirs(f'assets/indexes', exist_ok=True)
          urllib.request.urlretrieve(index_url, f'assets/indexes/{index_id}.json')
          
          with open(f'assets/indexes/{index_id}.json', 'r') as f:
              index_data = json.load(f)

          # 3. オブジェクトをダウンロード (ハッシュ値を元に取得)
          # ※数が多いので、主要なもの、あるいは最初の100個に制限することも可能ですが、
          # 今回は全取得を試みます（容量注意！）
          os.makedirs('assets/objects', exist_ok=True)
          objects = index_data.get('objects', {})
          
          print(f"Total assets to download: {len(objects)}")
          
          count = 0
          for name, info in objects.items():
              hash_val = info['hash']
              path = f"{hash_val[:2]}/{hash_val}"
              url = f"https://resources.download.minecraft.net/{path}"
              
              target_dir = os.path.join('assets/objects', hash_val[:2])
              os.makedirs(target_dir, exist_ok=True)
              
              target_path = os.path.join(target_dir, hash_val)
              if not os.path.exists(target_path):
                  try:
                      urllib.request.urlretrieve(url, target_path)
                      count += 1
                      if count % 100 == 0: print(f"Downloaded {count} assets...")
                  except:
                      print(f"Failed to download: {name}")

          print(f"Mission Log: Assets deployment completed! ({count} files)")

      - name: PythonでAssetsも90MBずつパッキング
        shell: python
        run: |
          print(" ※前のステップのパッキング処理に 'assets' フォルダも含めるように拡張")
          print("ファイル数が膨大になるため、zip名に 'assets_part' を付けるのがお勧め")

      - name: Pythonでライブラリを90MBずつパッキング
        shell: python
        run: |
          import os
          import zipfile

          lib_dir = 'libraries'
          max_size = 90 * 1024 * 1024  # 90MB
          
          files = [os.path.join(lib_dir, f) for f in os.listdir(lib_dir) if os.path.isfile(os.path.join(lib_dir, f))]
          
          current_zip_idx = 1
          current_zip_size = 0
          current_zip = zipfile.ZipFile(f'lib_part{current_zip_idx}.zip', 'w', zipfile.ZIP_DEFLATED)

          for file in files:
              f_size = os.path.getsize(file)
              
              # もし次のファイルを足すと90MBを超えるなら、新しいZIPへ
              if current_zip_size + f_size > max_size:
                  current_zip.close()
                  print(f'Finished lib_part{current_zip_idx}.zip (Size: {current_zip_size // 1024 // 1024}MB)')
                  current_zip_idx += 1
                  current_zip_size = 0
                  current_zip = zipfile.ZipFile(f'lib_part{current_zip_idx}.zip', 'w', zipfile.ZIP_DEFLATED)
              
              current_zip.write(file, os.path.basename(file))
              current_zip_size += f_size
          
          current_zip.close()
          print(f'Finished final lib_part{current_zip_idx}.zip (Size: {current_zip_size // 1024 // 1024}MB)')

      - name: 変更をコミットしてPush
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "kakao[bot]"

          # 1. まずは新しい分割ZIPなどをすべてステージング
          rm -f lib.zip
          git add lib_part*.zip version_manifest.json client.jar server.jar 2>/dev/null || true

          # 2. 変更がある場合のみ、一旦「ローカルコミット」を完了させる
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: ライブラリを90MBずつパッキングして更新 [skip ci]"
            
            # 3. コミットした後に rebase して、GitHub上の最新履歴と繋げる
            # 競合（Conflict）した場合は、このActionsで作ったファイルを優先
            git pull origin main --rebase -X theirs

            # 4. 最後にまとめてPush
            git push origin main
            echo "missionLog: 分割パッキング作戦、GitHubへのPushに成功しました！ ✅"
          else
            echo "missionLog: 更新が必要なファイルがありませんでした。 😴"
          fi
